# ⚠️ DEPRECATED (2026-06-17)
# 이 워크플로우는 더 이상 사용하지 않습니다.
# - 토큰 export는 "Friendli Design Token Exporter"가 브랜치에 직접 PR을 생성하는
#   방식으로 대체되었습니다 (repository_dispatch: update-tokens 경로 미사용).
# - 파일은 이력 보존 목적으로 남겨두며, 추후 제거 예정입니다.
# - 워크플로우는 `gh workflow disable`로 비활성화되어 있어 어떤 트리거로도 실행되지 않습니다.
#   다시 활성화하려면 `gh workflow enable "transform-tokens.yml"` 를 실행하세요.
name: '[DEPRECATED] Transform tokens send from figma'
# this triggers the action when a post to "https://api.github.com/repos/:username/:repo/dispatches" comes in
on:
  repository_dispatch:
    # and the event_type property from the request body is 'update-tokens'
    types: [update-tokens]

jobs:
  build:
    name: Transform Figma design tokens for specific platforms
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master

      - name: mkdir "tokens" directory
        run: 'mkdir -p tokens'

      - name: create json from request body
        id: create-json
        uses: jsdaniell/create-json@v1.2.2
        with:
          # it uses the figma filename that was send as then filename parameter
          name: ${{ github.event.client_payload.filename }}
          # it uses the json string that was send as the tokens parameter
          json: ${{ github.event.client_payload.tokens }}
          # it uses the directory named "tokens" to store this json file (change this if you changed it above to use a different folder)
          dir: 'tokens'

      - name: Normalize token structure
        # Design Tokens (lukasoppermann/design-tokens) plugin changes:
        #   1. Top-level `variables { core, color, layout, radius }` wrapper
        #      was removed -- we re-wrap it here.
        #   2. `font` may arrive renamed to `typography` and restructured by
        #      semantic category. We flatten back into `font.<cat>` with
        #      `typography-<cat>-<size>[-<weight>]` leaf keys.
        #   3. Weight variants (regular/medium/semibold) arrive as sub-keys
        #      under each size. We flatten those into separate leaves AND
        #      overwrite the (incorrect) `fontWeight.value` -- Figma exports
        #      the same number across every variant of a size, so we derive
        #      the correct variable-font axis from the weight key name.
        #   4. Newer plugin exports omit the Inter groups (`font.body-inter`,
        #      `font.title-inter`). We restore any missing group from the
        #      previously committed file (git HEAD) so they are not lost.
        # Every weight variant carries an explicit -{weight} suffix on the
        # emitted leaf key, including the default weight for the category:
        #   body.{size}.regular   -> typography-body-{size}-regular
        #   display.{size}.medium -> typography-display-{size}-medium
        # This applies whether the variant came in nested under a size
        # group or already flat from a previous run; Case 3 renames
        # suffix-less default-weight leaves so the output stays uniform.
        env:
          TOKENS_DIR: tokens
        run: |
          node -e '
            const fs = require("fs");
            const path = require("path");
            const cp = require("child_process");
            const dir = process.env.TOKENS_DIR;
            const wrapKeys = ["core", "color", "layout", "radius"];

            // Variable-font axis values keyed by Figma weight-variant name.
            // Figma exports `fontWeight.value` as a single (wrong) number per
            // size group, so we derive the real axis from the key itself.
            const WEIGHT_TO_AXIS = { regular: 430, medium: 530, semibold: 650 };

            // typography category -> `font` sub-key mapping rules.
            // defaultWeight: null = single-weight category (no variants to
            //   reconcile); otherwise the weight implied by a leaf that
            //   arrives suffix-less. Case 3 renames such leaves to carry
            //   this suffix explicitly.
            const typoCats = [
              { name: "title",   defaultWeight: null      },
              { name: "body",    defaultWeight: "regular" },
              { name: "display", defaultWeight: "medium"  },
              { name: "caption", defaultWeight: null      },
              { name: "mono",    defaultWeight: null      },
            ];

            // Size keys arrive in two shapes:
            //   short:  "md"                  -> "typography-{cat}-md"
            //   full:   "typography-body-md"  -> use as-is
            const baseLeafKey = (cat, sizeKey) =>
              sizeKey.startsWith("typography-") ? sizeKey : `typography-${cat}-${sizeKey}`;

            // Flatten a category container into a leaf-keyed map. Handles
            // single-weight categories ({size: leaf}) and weight-variant
            // categories ({size: {regular|medium|semibold: leaf}}).
            // Every weight variant gets an explicit -{weight} suffix on its
            // leaf key, including the default weight for the category, so
            // the emitted key always identifies which axis it represents.
            const flattenCategory = (cat, src) => {
              const out = {};
              for (const [sizeKey, val] of Object.entries(src)) {
                if (!val || typeof val !== "object") continue;
                const base = baseLeafKey(cat, sizeKey);
                if ("fontSize" in val) {
                  out[base] = val;
                } else {
                  for (const [weight, tok] of Object.entries(val)) {
                    if (!tok || typeof tok !== "object") continue;
                    if (tok.fontWeight && WEIGHT_TO_AXIS[weight] != null) {
                      tok.fontWeight = { ...tok.fontWeight, value: WEIGHT_TO_AXIS[weight] };
                    }
                    out[`${base}-${weight}`] = tok;
                  }
                }
              }
              return out;
            };

            // A category bucket is weight-variant-shaped when at least one
            // size group lacks `fontSize` but contains children that have it.
            const hasWeightVariants = (src) =>
              Object.values(src).some(
                (v) =>
                  v &&
                  typeof v === "object" &&
                  !("fontSize" in v) &&
                  Object.values(v).some((c) => c && typeof c === "object" && "fontSize" in c)
              );

            for (const f of fs.readdirSync(dir)) {
              if (!f.endsWith(".json")) continue;
              const p = path.join(dir, f);
              const j = JSON.parse(fs.readFileSync(p, "utf8"));
              let changed = false;

              // Case 1: legacy raw uses `typography` wrapper -> build `font`.
              if (j.typography && !j.font && typeof j.typography === "object") {
                const T = j.typography;
                const font = {};

                for (const { name: cat } of typoCats) {
                  if (!T[cat] || typeof T[cat] !== "object") continue;
                  font[cat] = flattenCategory(cat, T[cat]);
                }

                // x deprecated -> font["title-inter"], font["body-inter"]
                const dep = T["x deprecated"];
                if (dep && typeof dep === "object") {
                  for (const [k, v] of Object.entries(dep)) {
                    font[k.replace(/\s+/g, "")] = v;
                  }
                }

                // font.family / font.weight pass-through
                if (T.font && typeof T.font === "object") {
                  if (T.font.family) font.family = T.font.family;
                  if (T.font.weight) font.weight = T.font.weight;
                }

                j.font = font;
                delete j.typography;
                changed = true;
              }

              // Case 2: raw already uses `font` wrapper -> flatten any
              // weight-variant sub-keys inside known typography categories.
              if (j.font && typeof j.font === "object") {
                for (const { name: cat } of typoCats) {
                  const src = j.font[cat];
                  if (!src || typeof src !== "object") continue;
                  if (!hasWeightVariants(src)) continue;
                  j.font[cat] = flattenCategory(cat, src);
                  changed = true;
                }
              }

              // Case 3: raw already flat, but default-weight leaves still
              // carry no -{weight} suffix (older Figma exports). Rename them
              // so every leaf identifies its axis explicitly.
              const WEIGHT_SUFFIXES = Object.keys(WEIGHT_TO_AXIS);
              if (j.font && typeof j.font === "object") {
                for (const { name: cat, defaultWeight } of typoCats) {
                  if (!defaultWeight) continue;
                  const src = j.font[cat];
                  if (!src || typeof src !== "object") continue;
                  const renamed = {};
                  let renamedAny = false;
                  for (const [k, v] of Object.entries(src)) {
                    const hasSuffix = WEIGHT_SUFFIXES.some((s) => k.endsWith(`-${s}`));
                    if (hasSuffix) {
                      renamed[k] = v;
                    } else {
                      renamed[`${k}-${defaultWeight}`] = v;
                      renamedAny = true;
                    }
                  }
                  if (renamedAny) {
                    j.font[cat] = renamed;
                    changed = true;
                  }
                }
              }

              // Case 4: preserve Inter typography groups. Newer Figma plugin
              // exports drop the `x deprecated` group, so the emitted
              // `font["body-inter"]` / `font["title-inter"]` would disappear on
              // each sync. The create-json step overwrote the file, but the
              // previously committed version (git HEAD) still holds them --
              // recover any group that is missing from the new export.
              const INTER_GROUPS = ["body-inter", "title-inter"];
              if (j.font && typeof j.font === "object") {
                const missing = INTER_GROUPS.filter((g) => !(g in j.font));
                if (missing.length) {
                  let prevFont = null;
                  try {
                    const prevRaw = cp.execSync(`git show HEAD:${p}`, {
                      encoding: "utf8",
                      stdio: ["ignore", "pipe", "ignore"],
                    });
                    prevFont = (JSON.parse(prevRaw) || {}).font || null;
                  } catch (_) {
                    prevFont = null;
                  }
                  if (prevFont && typeof prevFont === "object") {
                    for (const g of missing) {
                      if (prevFont[g] && typeof prevFont[g] === "object") {
                        j.font[g] = prevFont[g];
                        changed = true;
                      }
                    }
                  }
                }
              }

              // Re-wrap with `variables`
              if (!j.variables && wrapKeys.some(k => k in j)) {
                const variables = {};
                for (const k of wrapKeys) {
                  if (k in j) { variables[k] = j[k]; delete j[k]; }
                }
                const { effect, font, typography, ...rest } = j;
                const out = {
                  ...(effect ? { effect } : {}),
                  variables,
                  ...rest,
                  ...(font ? { font } : {}),
                  ...(typography ? { typography } : {}),
                };
                // Write minified JSON so the subsequent prettier step decides
                // line breaks natively (default `json` parser keeps short objects
                // on one line, long ones multi-line — matching mains layout).
                fs.writeFileSync(p, JSON.stringify(out));
                changed = true;
              } else if (changed) {
                fs.writeFileSync(p, JSON.stringify(j));
              }

              if (changed) console.log("Normalized " + p);
            }
          '

      - name: run prettier on json file
        run: npx prettier --write tokens/*.json

      - name: Create PR
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: ${{ github.event.client_payload.commitMessage || 'Tokens updated' }}
          title: 'Design tokens updated #${{github.run_id}}'
          body: 'Design tokens have been updated via Figma and need to be reviewed.'
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_TOKEN }}
          BRANCH_NAME: 'main'
